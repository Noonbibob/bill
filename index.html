<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advance Bill Generator - Audio Galaxy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .bill-card {
            width: 400px;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #bill-preview-container {
            position: absolute;
            left: -9999px;
            top: 0;
        }
        .touch-button {
            transition: transform 0.1s;
        }
        .touch-button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 space-y-4">
        <h1 class="text-2xl font-bold text-center text-slate-800 mb-6 uppercase tracking-tight">Generate Receipt</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Customer Name</label>
                <input type="text" id="custName" placeholder="Enter name" class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Item / Model</label>
                <input type="text" id="itemName" placeholder="e.g. Home Theater System" class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Advance Amount Paid ($)</label>
                <input type="number" id="amount" placeholder="0.00" class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>

            <button onclick="generateAndShare()" class="touch-button w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 text-lg shadow-md mt-2">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.412 2.503 1.112 3.487l-1.18 4.312 4.428-1.162c.94.516 2.01.809 3.15.809 3.181 0 5.767-2.586 5.768-5.766 0-3.18-2.587-5.766-5.767-5.766zm3.375 8.203c-.147.414-.725.762-1.001.815-.255.049-.583.088-1.636-.33-1.282-.507-2.094-1.817-2.158-1.902-.064-.085-.515-.685-.515-1.303 0-.618.324-.921.439-1.047.116-.126.255-.157.34-.157h.243c.081 0 .189-.031.296.223.111.265.378.921.411.988.033.067.054.145.01.233-.044.088-.066.143-.132.221-.066.078-.138.174-.197.234-.066.067-.134.14-.058.271.077.132.341.562.733.911.505.45 0 .633.712.712.083.009.136.009.213-.075.077-.085.334-.388.423-.52.088-.132.176-.111.297-.067.121.044.767.362.899.428.132.066.221.098.254.154.033.056.033.324-.114.738z"/></svg>
                Send to WhatsApp
            </button>
        </div>
    </div>

    <!-- Hidden Bill Template for Capture -->
    <div id="bill-preview-container">
        <div id="bill-receipt" class="bill-card border border-gray-200">
            <!-- Audio Galaxy Header -->
            <div class="flex items-start gap-3 mb-6">
                <!-- SVG Logo representing Audio Galaxy (AG) -->
                <div class="flex-shrink-0 w-16 h-16 bg-black rounded-lg flex items-center justify-center p-1 border-2 border-[#D4AF37]">
                    <svg viewBox="0 0 100 100" class="w-full h-full">
                        <path d="M50 5 L95 27.5 L95 72.5 L50 95 L5 72.5 L5 27.5 Z" fill="none" stroke="#D4AF37" stroke-width="4"/>
                        <text x="50%" y="65%" text-anchor="middle" fill="#D4AF37" font-family="Arial Black" font-size="35">AG</text>
                    </svg>
                </div>
                <div class="flex flex-col">
                    <h2 class="text-2xl font-black text-slate-900 leading-none">AUDIO GALAXY</h2>
                    <p class="text-[10px] text-slate-600 mt-1 font-medium leading-tight">
                        61/2, 59th, 'A' Cross, 4th N Block, Rajajinagar<br>
                        Bengaluru, Karnataka-560010<br>
                        <span class="flex items-center gap-1 mt-1">
                            <svg class="w-2.5 h-2.5" fill="currentColor" viewBox="0 0 24 24"><path d="M6.62 10.79a15.15 15.15 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                            6360268816
                        </span>
                    </p>
                </div>
            </div>

            <div class="text-center border-y py-2 mb-4">
                <h3 class="text-xs font-bold uppercase tracking-[0.3em] text-slate-500">Advance Receipt</h3>
                <p class="text-[10px] text-slate-400 mt-0.5" id="receipt-date"></p>
            </div>
            
            <div class="space-y-3">
                <div class="flex justify-between border-b border-gray-100 pb-1.5">
                    <span class="text-xs text-gray-400 font-bold uppercase tracking-wider">Customer:</span>
                    <span class="text-sm font-bold text-slate-800" id="disp-name">-</span>
                </div>
                <div class="flex justify-between border-b border-gray-100 pb-1.5">
                    <span class="text-xs text-gray-400 font-bold uppercase tracking-wider">Item/Model:</span>
                    <span class="text-sm font-semibold text-slate-700" id="disp-item">-</span>
                </div>
                
                <div class="mt-8 bg-slate-50 p-6 rounded-xl text-center border-2 border-dashed border-slate-200">
                    <p class="text-[10px] text-slate-400 uppercase font-black tracking-widest mb-1">Advance Amount Received</p>
                    <p class="text-4xl font-black text-blue-600" id="disp-amount">$0.00</p>
                </div>
            </div>

            <div class="mt-8 pt-4">
                <p class="text-xs font-bold text-center text-slate-800 mb-6 uppercase tracking-widest border-t pt-4">Thank you for your visit!</p>
                <div class="flex justify-between items-end">
                    <div class="text-[9px] text-gray-400 font-mono">ID: <span id="trans-id"></span></div>
                    <div class="text-[9px] text-gray-500 font-bold uppercase italic border-t border-slate-300 px-4 pt-1">Authorized Signatory</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Message Overlay -->
    <div id="status-msg" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-2xl hidden text-sm font-bold shadow-2xl z-50">
        Generating Bill...
    </div>

    <script>
        function showMsg(txt) {
            const status = document.getElementById('status-msg');
            status.innerText = txt;
            status.classList.remove('hidden');
            setTimeout(() => {
                status.classList.add('hidden');
            }, 3000);
        }

        async function generateAndShare() {
            const name = document.getElementById('custName').value;
            const item = document.getElementById('itemName').value;
            const amount = document.getElementById('amount').value;

            if (!name || !amount) {
                showMsg("⚠️ Please fill in Name and Amount");
                return;
            }

            // Update Preview Text
            document.getElementById('disp-name').innerText = name;
            document.getElementById('disp-item').innerText = item || "General Service";
            document.getElementById('disp-amount').innerText = "₹" + parseFloat(amount).toLocaleString(); // Switched to Rupees for local business
            document.getElementById('receipt-date').innerText = new Date().toLocaleString('en-IN');
            document.getElementById('trans-id').innerText = Math.random().toString(36).substr(2, 9).toUpperCase();

            showMsg("⚙️ Processing Receipt...");

            const billElement = document.getElementById('bill-receipt');
            
            try {
                const canvas = await html2canvas(billElement, {
                    scale: 3, 
                    backgroundColor: "#ffffff",
                    useCORS: true
                });

                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                const file = new File([blob], "AudioGalaxy_Receipt.png", { type: "image/png" });

                // Try Web Share API
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    try {
                        await navigator.share({
                            files: [file],
                            title: 'Audio Galaxy Receipt',
                            text: `Hi ${name}, here is your advance receipt from Audio Galaxy for ₹${amount}.`
                        });
                        return;
                    } catch (err) {
                        console.log("Native share failed");
                    }
                }

                // Fallback
                showMsg("📥 Saving receipt & opening WhatsApp...");
                const link = document.createElement('a');
                link.download = `Receipt_${name}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();

                const msg = encodeURIComponent(`Hello ${name},\n\nAttached is your advance receipt from *Audio Galaxy* for the amount of ₹${amount}.\n\nThank you!`);
                setTimeout(() => {
                    window.location.href = `https://wa.me/?text=${msg}`;
                }, 1000);

            } catch (error) {
                console.error(error);
                showMsg("❌ Error creating image.");
            }
        }
    </script>
</body>
</html>
